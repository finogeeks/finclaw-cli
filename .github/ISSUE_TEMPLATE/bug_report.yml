name: Bug report
description: Report a problem with the finclaw CLI
title: "[bug]: "
labels:
  - bug
  - triage:pending
body:
  - type: markdown
    attributes:
      value: |
        Runtime fixes usually land in the upstream finclaw repository; this issue tracks your report.
        Please include version, OS, and clear reproduction steps.

  - type: input
    id: version
    attributes:
      label: finclaw version
      description: Output of `finclaw --version`
      placeholder: "0.7.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands and configuration
      placeholder: |
        1. finclaw init
        2. finclaw serve --host 0.0.0.0
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs or panic text if applicable
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Profile name, systemd unit snippet, etc.
    validations:
      required: false
